  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

      --accent: #9d7dea;

    body {

      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    body::after {
      content: '';

      z-index: 1;

    .hero {
      position: relative;
      z-index: 2;
      text-align: center;
      padding: 2rem;
      animation: arrive 2s cubic-bezier(.22,1,.36,1) both;

      letter-spacing: 0.02em;

      font-weight: 300;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .meta .dot {
      margin: 0 0.85em;
      color: var(--accent);
      opacity: 0.38;
    }

    .links {
      margin-top: 2.8rem;

      gap: 2.6rem;
      justify-content: center;

    .links a {

      letter-spacing: 0.13em;

      text-decoration: none;

    .resume { margin-top: 2.4rem; }

    .resume a {

      font-size: clamp(0.74rem, 1.7vw, 0.84rem);
      font-weight: 400;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--bg);
      background: var(--accent);
      padding: 0.78em 2.4em;
      text-decoration: none;
      display: inline-block;
      transition: opacity 0.2s;

    .glyph {

      letter-spacing: 0.14em;
      color: var(--accent);
      opacity: 0.52;
      z-index: 2;
      user-select: none;
    }

<span class="glyph" aria-hidden="true">G&thinsp;=&thinsp;(V,&thinsp;E)</span>

<script>
const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');
const RGB    = '157,125,234';

let W, H, nodes = [], edges = [];

function build() {
  nodes = [];
  edges = [];

  const N   = W < 600 ? 32 : 62;
  const cx  = W / 2, cy = H / 2;
  // tighter dead zone — nodes can get close but not on top of the text
  const drx = W * 0.16;
  const dry = H * 0.14;

  for (let i = 0; i < N; i++) {
    let x, y, tries = 0;
    do {
      x = W * 0.03 + Math.random() * W * 0.94;
      y = H * 0.03 + Math.random() * H * 0.94;
      tries++;
    } while (
      tries < 200 &&
      Math.pow((x - cx) / drx, 2) + Math.pow((y - cy) / dry, 2) < 1
    );
    nodes.push({
      id: i, x, y,
      r:  1.8 + Math.random() * 1.8,
      pf: 0.0006 + Math.random() * 0.0007, // pulse frequency
      pp: Math.random() * Math.PI * 2,      // pulse phase
    });
  }

  // directed edges: left-to-right flow bias, limit degree
  const maxOut = 4, maxIn = 4;
  const outD   = new Array(N).fill(0);
  const inD    = new Array(N).fill(0);
  const maxD   = Math.min(W, H) * 0.34;

  [...nodes]
    .sort((a, b) => a.x - b.x)
    .forEach(fn => {
      if (outD[fn.id] >= maxOut) return;
      const cands = nodes
        .filter(tn => tn.id !== fn.id && tn.x > fn.x - 20 && inD[tn.id] < maxIn)
        .map(tn => ({ tn, d: Math.hypot(tn.x - fn.x, tn.y - fn.y) }))
        .filter(({ d }) => d > 10 && d < maxD)
        .sort((a, b) => a.d - b.d)
        .slice(0, 5);

      cands.slice(0, 2 + Math.floor(Math.random() * 2)).forEach(({ tn }) => {
        if (outD[fn.id] < maxOut && inD[tn.id] < maxIn) {
          addEdge(fn, tn);
          outD[fn.id]++;
          inD[tn.id]++;
        }
      });
    });
}

function addEdge(fn, tn) {
  const cap   = 0.5 + Math.random() * 3.0;
  const speed = cap * 1.2e-4;

  const dx = tn.x - fn.x, dy = tn.y - fn.y;
  const d  = Math.hypot(dx, dy) || 1;
  const nx = -dy / d, ny = dx / d;
  const curv = (Math.random() - 0.5) * Math.min(d * 0.5, 88);

  const particles = [];
  const gap = 0.27 / cap;
  for (let t = Math.random() * gap; t < 1; t += gap) particles.push({ t });

  edges.push({
    from: fn.id, to: tn.id, cap, speed,
    cpx: (fn.x + tn.x) / 2 + nx * curv,
    cpy: (fn.y + tn.y) / 2 + ny * curv,
    particles,
  });
}

let last = 0;
function frame(ts) {
  const dt = Math.min(ts - last, 50);
  last = ts;
  ctx.clearRect(0, 0, W, H);

  // edges
  edges.forEach(e => {
    const fp = nodes[e.from], tp = nodes[e.to];
    const a = 0.038 + e.cap * 0.034;
    const lw = 0.28 + e.cap * 0.30;

    // glow pass — wide, very transparent
    ctx.strokeStyle = `rgba(${RGB},${a * 0.38})`;
    ctx.lineWidth   = lw * 3.8;
    ctx.beginPath();
    ctx.moveTo(fp.x, fp.y);
    ctx.quadraticCurveTo(e.cpx, e.cpy, tp.x, tp.y);
    ctx.stroke();

    // crisp line
    ctx.strokeStyle = `rgba(${RGB},${a})`;
    ctx.lineWidth   = lw;
    ctx.beginPath();
    ctx.moveTo(fp.x, fp.y);
    ctx.quadraticCurveTo(e.cpx, e.cpy, tp.x, tp.y);
    ctx.stroke();

    // arrowhead — tangent at t=1 of quadratic bezier = direction (tp - cp)
    const angle = Math.atan2(tp.y - e.cpy, tp.x - e.cpx);
    const aL = 4.5, aW = Math.PI / 6.5;
    const ax = tp.x - Math.cos(angle) * (tp.r + 4.5);
    const ay = tp.y - Math.sin(angle) * (tp.r + 4.5);
    ctx.beginPath();
    ctx.moveTo(ax, ay);
    ctx.lineTo(ax - aL * Math.cos(angle - aW), ay - aL * Math.sin(angle - aW));
    ctx.lineTo(ax - aL * Math.cos(angle + aW), ay - aL * Math.sin(angle + aW));
    ctx.closePath();
    ctx.fillStyle = `rgba(${RGB},${Math.min(a * 2.6, 0.46)})`;
    ctx.fill();

    // particles on Bezier path
    e.particles.forEach(p => {
      p.t = (p.t + e.speed * dt) % 1;
      const t = p.t, mt = 1 - t;
      const px = mt*mt*fp.x + 2*mt*t*e.cpx + t*t*tp.x;
      const py = mt*mt*fp.y + 2*mt*t*e.cpy + t*t*tp.y;
      const fade = t < 0.09 ? t / 0.09 : t > 0.91 ? (1 - t) / 0.09 : 1;
      ctx.beginPath();
      ctx.arc(px, py, 1.5, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(${RGB},${0.68 * fade})`;
      ctx.fill();
    });
  });

  // nodes with pulse
  nodes.forEach(n => {
    const pulse = 0.5 + 0.5 * Math.sin(ts * n.pf + n.pp); // 0→1

    // pulsing glow halo
    const glowR = n.r * (4.5 + 2.8 * pulse);
    const glowA = 0.10 + 0.16 * pulse;
    const g = ctx.createRadialGradient(n.x, n.y, 0, n.x, n.y, glowR);
    g.addColorStop(0, `rgba(${RGB},${glowA})`);
    g.addColorStop(1, `rgba(${RGB},0)`);
    ctx.beginPath();
    ctx.arc(n.x, n.y, glowR, 0, Math.PI * 2);
    ctx.fillStyle = g;
    ctx.fill();

    // core dot, slightly brighter at pulse peak
    ctx.beginPath();
    ctx.arc(n.x, n.y, n.r, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(${RGB},${0.60 + 0.28 * pulse})`;
    ctx.fill();
  });

  requestAnimationFrame(frame);
}

let rebuildTimer;
window.addEventListener('resize', () => {
  W = canvas.width  = window.innerWidth;
  H = canvas.height = window.innerHeight;
  clearTimeout(rebuildTimer);
  rebuildTimer = setTimeout(build, 240);
});

W = canvas.width  = window.innerWidth;
H = canvas.height = window.innerHeight;
build();
requestAnimationFrame(frame);
</script>
