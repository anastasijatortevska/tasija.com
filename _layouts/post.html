<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title }} — Anastasija Tortevska</title>
  <meta name="description" content="{{ page.excerpt | strip_html | strip_newlines | truncate: 160 }}">

  <link rel="icon" type="image/svg+xml" href="/assets/img/favicon/favicon.svg">
  <link rel="icon" type="image/png" sizes="32x32" href="/assets/img/favicon/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/assets/img/favicon/favicon-16x16.png">
  <link rel="apple-touch-icon" sizes="180x180" href="/assets/img/favicon/apple-touch-icon.png">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300..500;1,9..144,300..500&family=JetBrains+Mono:wght@300;400&family=Source+Serif+4:ital,opsz,wght@0,8..60,400;0,8..60,600;1,8..60,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css">

  <script>document.documentElement.dataset.theme = localStorage.getItem('theme') || 'dark';</script>

  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      color-scheme: dark;
      --bg:        #08080f;
      --text:      #ece9e2;
      --text-soft: rgba(236, 233, 226, 0.85);
      --muted:     #6a677f;
      --accent:    #9d7dea;
      --rgb:       157, 125, 234;
      --cue-bg:    rgba(10, 10, 17, 0.72);
    }

    :root[data-theme="light"] {
      color-scheme: light;
      --bg:        #f6f3ec;
      --text:      #211d33;
      --text-soft: rgba(33, 29, 51, 0.88);
      --muted:     #6e6889;
      --accent:    #5f3dc4;
      --rgb:       95, 61, 196;
      --cue-bg:    rgba(251, 249, 244, 0.85);
    }

    body {
      background: var(--bg);
      background-image: radial-gradient(ellipse 80% 40% at 50% -10%, rgba(var(--rgb), 0.08), transparent);
      color: var(--text);
      font-family: 'Source Serif 4', Georgia, serif;
      line-height: 1.8;
      overflow-x: hidden;
    }

    .top {
      max-width: 42rem;
      margin: 0 auto;
      padding: 2rem 1.5rem 0;
    }

    .top a {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.78rem;
      font-weight: 300;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--muted);
      text-decoration: none;
      transition: color 0.22s;
    }

    .top a:hover { color: var(--accent); }

    .theme-toggle {
      position: fixed;
      top: 1.4rem;
      right: 1.4rem;
      z-index: 4;
      width: 2.5rem;
      height: 2.5rem;
      border-radius: 50%;
      border: 1px solid rgba(var(--rgb), 0.35);
      background: var(--cue-bg);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      color: var(--accent);
      font-size: 1.05rem;
      line-height: 1;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: border-color 0.22s;
    }

    .theme-toggle:hover { border-color: rgba(var(--rgb), 0.8); }

    main {
      max-width: 42rem;
      margin: 0 auto;
      padding: 3rem 1.5rem 4rem;
    }

    .post-header { margin-bottom: 2.6rem; }

    .post-header h1 {
      font-family: 'Fraunces', Georgia, serif;
      font-size: clamp(2.1rem, 6vw, 3rem);
      font-weight: 400;
      line-height: 1.1;
      letter-spacing: 0.01em;
    }

    .post-header .date {
      margin-top: 0.9rem;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.78rem;
      font-weight: 300;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--muted);
    }

    article { font-size: 1.06rem; color: var(--text-soft); }

    article p + p { margin-top: 1.1rem; }

    article h2, article h3 {
      font-family: 'Fraunces', Georgia, serif;
      font-weight: 400;
      font-style: italic;
      color: var(--accent);
      margin: 2.2rem 0 0.9rem;
      line-height: 1.15;
    }

    article h2 { font-size: 1.8rem; }
    article h3 { font-size: 1.45rem; }

    article a { color: var(--accent); text-decoration-color: rgba(var(--rgb), 0.4); }

    article ul, article ol { margin: 1.1rem 0 1.1rem 1.4rem; }
    article li + li { margin-top: 0.4rem; }

    article blockquote {
      margin: 1.4rem 0;
      padding: 0.2rem 0 0.2rem 1.2rem;
      border-left: 2px solid rgba(var(--rgb), 0.45);
      color: var(--muted);
      font-style: italic;
    }

    article code {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.86em;
      background: rgba(var(--rgb), 0.09);
      padding: 0.12em 0.4em;
      border-radius: 3px;
    }

    article pre {
      margin: 1.4rem 0;
      padding: 1.1rem 1.3rem;
      background: rgba(var(--rgb), 0.05);
      border: 1px solid rgba(var(--rgb), 0.14);
      border-radius: 4px;
      overflow-x: auto;
      line-height: 1.6;
    }

    article pre code { background: none; padding: 0; font-size: 0.84rem; }

    article img { max-width: 100%; }

    article hr {
      border: none;
      border-top: 1px solid rgba(var(--rgb), 0.18);
      margin: 2.2rem auto;
      width: 40%;
    }

    .katex { font-size: 1.06em; }
    .katex-display { overflow-x: auto; overflow-y: hidden; padding: 0.2rem 0; }

    footer {
      max-width: 42rem;
      margin: 0 auto;
      padding: 0 1.5rem 2.5rem;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.75rem;
      font-weight: 300;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--muted);
    }
  </style>
</head>
<body>

<button class="theme-toggle" id="theme-toggle" aria-label="Toggle light/dark mode">&#9789;</button>

<nav class="top"><a href="/">&larr; tasija.com</a></nav>

<main>
  <header class="post-header">
    <h1>{{ page.title }}</h1>
    <p class="date">{{ page.date | date: "%B %-d, %Y" }}</p>
  </header>
  <article>
    {{ content }}
  </article>
</main>

<footer>&copy; {{ page.date | date: "%Y" }} Anastasija Tortevska</footer>

<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js"></script>
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/contrib/auto-render.min.js" onload="renderMath()"></script>
<script>
const themeToggle = document.getElementById('theme-toggle');

function applyTheme(t) {
  document.documentElement.dataset.theme = t;
  localStorage.setItem('theme', t);
  themeToggle.innerHTML = t === 'dark' ? '&#9789;' : '&#9788;';
}

applyTheme(document.documentElement.dataset.theme || 'dark');

themeToggle.addEventListener('click', () => {
  applyTheme(document.documentElement.dataset.theme === 'dark' ? 'light' : 'dark');
});

function renderMath() {
  // kramdown (math_engine: mathjax) emits <script type="math/tex"> tags
  document.querySelectorAll('script[type^="math/tex"]').forEach(el => {
    const display = el.type.includes('mode=display');
    const out = document.createElement(display ? 'div' : 'span');
    katex.render(el.textContent, out, { displayMode: display, throwOnError: false });
    el.replaceWith(out);
  });
  // fallback for raw delimiters that survive markdown conversion
  renderMathInElement(document.body, {
    delimiters: [
      { left: '$$', right: '$$', display: true },
      { left: '\\[', right: '\\]', display: true },
      { left: '\\(', right: '\\)', display: false },
    ],
    throwOnError: false,
  });
}
</script>

</body>
</html>
